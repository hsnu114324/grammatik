<html lang="zh-Hant">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德文句子練習</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: .4rem;
    }

    header p {
      font-size: .95rem;
      color: #aaa;
    }

    .score-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
      font-size: .9rem;
    }

    .score-bar span {
      background: rgba(255,255,255,.07);
      padding: .45rem 1.2rem;
      border-radius: 999px;
    }

    .score-bar .correct-count { color: #4ade80; }
    .score-bar .wrong-count { color: #f87171; }
    .score-bar .total-count { color: #93c5fd; }

    .card {
      background: rgba(255, 255, 255, .06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      transition: border-color .3s, box-shadow .3s;
    }

    .card.correct {
      border-color: #4ade80;
      box-shadow: 0 0 20px rgba(74, 222, 128, .15);
    }

    .card.wrong {
      border-color: #f87171;
      box-shadow: 0 0 20px rgba(248, 113, 113, .12);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1rem;
    }

    .card-number {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      font-weight: 700;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      flex-shrink: 0;
    }

    .card-label {
      font-size: .8rem;
      color: #999;
      letter-spacing: .5px;
    }

    .verb-hint {
      display: inline-block;
      background: rgba(196, 181, 253, .15);
      color: #c4b5fd;
      padding: .15rem .55rem;
      border-radius: 6px;
      font-size: .8rem;
      margin-left: .5rem;
      letter-spacing: 0;
      font-style: italic;
    }

    .word-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1.2rem;
    }

    .chip {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      padding: .35rem .75rem;
      border-radius: 8px;
      font-size: .95rem;
      color: #e0e0e0;
      cursor: pointer;
      transition: background .2s, transform .15s;
      user-select: none;
    }

    .chip:hover {
      background: rgba(255,255,255,.18);
      transform: translateY(-1px);
    }

    .chip.used {
      opacity: .35;
      pointer-events: none;
    }

    .input-row {
      display: flex;
      gap: .6rem;
      align-items: stretch;
    }

    .input-row input {
      flex: 1;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px;
      padding: .65rem 1rem;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color .3s;
    }

    .input-row input:focus {
      border-color: #ffd200;
    }

    .input-row input:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .btn-submit {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      padding: .65rem 1.3rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      white-space: nowrap;
    }

    .btn-submit:hover { opacity: .9; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .feedback {
      margin-top: .85rem;
      padding: .7rem 1rem;
      border-radius: 10px;
      font-size: .9rem;
      line-height: 1.6;
      display: none;
    }

    .feedback.show { display: block; }

    .feedback.success {
      background: rgba(74, 222, 128, .12);
      border: 1px solid rgba(74, 222, 128, .25);
      color: #4ade80;
    }

    .feedback.error {
      background: rgba(248, 113, 113, .1);
      border: 1px solid rgba(248, 113, 113, .2);
      color: #fca5a5;
    }

    .hint-btn {
      background: none;
      border: none;
      color: #93c5fd;
      cursor: pointer;
      font-size: .85rem;
      margin-top: .5rem;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .hint-btn:hover { color: #bfdbfe; }

    .hint-text {
      margin-top: .4rem;
      font-size: .85rem;
      color: #c4b5fd;
      display: none;
    }

    .hint-text.show { display: block; }

    .diff-correct { color: #4ade80; font-weight: 600; }
    .diff-wrong { color: #f87171; text-decoration: line-through; font-weight: 600; }

    .btn-reset {
      display: block;
      margin: 2rem auto 0;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: #ccc;
      padding: .7rem 2rem;
      border-radius: 10px;
      font-size: .95rem;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-reset:hover { background: rgba(255,255,255,.14); }

    .translation {
      margin-top: .5rem;
      padding: .5rem .75rem;
      background: rgba(147, 197, 253, .08);
      border: 1px solid rgba(147, 197, 253, .18);
      border-radius: 8px;
      color: #93c5fd;
      font-size: .88rem;
      line-height: 1.5;
    }

    .btn-next {
      display: none;
      margin: 1.5rem auto 0;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      padding: .8rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .btn-next.show { display: block; }
    .btn-next:hover { opacity: .9; transform: translateY(-1px); }

    .round-summary {
      text-align: center;
      padding: 1.5rem;
      margin: 1rem 0;
      background: rgba(255,255,255,.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.1);
      display: none;
    }

    .round-summary.show { display: block; }

    .round-summary h2 {
      font-size: 1.3rem;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: .6rem;
    }

    .round-summary p {
      color: #ccc;
      font-size: .95rem;
    }

    .round-summary .stat-highlight {
      color: #4ade80;
      font-weight: 600;
    }

    @media (max-width: 500px) {
      body { padding: 1.2rem .6rem; }
      header h1 { font-size: 1.5rem; }
      .card { padding: 1.1rem; }
      .input-row { flex-direction: column; }
      .btn-submit { text-align: center; }
    }
  </style>

const QUIZ_SIZE = 5;
let currentQuestions = [];
let stats = { correct: 0, wrong: 0, roundCorrect: 0, roundWrong: 0, roundDone: 0 };
let solved = new Set();

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(str) {
  return str.replace(/\s+/g, ' ').replace(/\s*,\s*/g, ', ').replace(/\s*([.?!])\s*$/, '$1').trim();
}

function getAllAnswers(dataIdx) {
  const d = DATA[dataIdx];
  return [d.answer, ...(d.altAnswers || [])];
}

function findClosestAnswer(userAnswer, dataIdx) {
  const answers = getAllAnswers(dataIdx);
  if (answers.length === 1) return answers[0];

  const uWords = normalize(userAnswer).replace(/[.?!]$/, '').trim().toLowerCase().split(/\s+/);
  let best = answers[0], bestScore = -1;

  for (const ans of answers) {
    const aWords = normalize(ans).replace(/[.?!]$/, '').trim().toLowerCase().split(/\s+/);
    let score = 0;
    for (let i = 0; i < Math.min(uWords.length, aWords.length); i++) {
      if (uWords[i] === aWords[i]) score++;
    }
    if (score > bestScore) { bestScore = score; best = ans; }
  }
  return best;
}

function buildDiff(userAnswer, correctAnswer) {
  const punct = correctAnswer.trim().slice(-1);
  const userWords = normalize(userAnswer).replace(/[.?!]$/, '').trim().split(/\s+/);
  const correctWords = normalize(correctAnswer).replace(/[.?!]$/, '').trim().split(/\s+/);

  let html = '<div style="margin-top:.35rem"><strong>你的回答：</strong> ';
  const maxLen = Math.max(userWords.length, correctWords.length);

  for (let i = 0; i < maxLen; i++) {
    const uw = userWords[i] || '';
    const cw = correctWords[i] || '';
    if (uw.toLowerCase() === cw.toLowerCase()) {
      html += `<span>${uw}</span> `;
    } else if (uw) {
      html += `<span class="diff-wrong">${uw}</span> `;
    }
  }
  html += `${punct}</div>`;
  return html;
}

function getHints(userAnswer, correctAnswer) {
  const hints = [];
  const uNorm = normalize(userAnswer);
  const cNorm = normalize(correctAnswer);
  const uWords = uNorm.replace(/[.?!]$/, '').trim().split(/\s+/);
  const cWords = cNorm.replace(/[.?!]$/, '').trim().split(/\s+/);

  if (uWords[0] && cWords[0] && uWords[0].toLowerCase() !== cWords[0].toLowerCase()) {
    hints.push(`句子的第一個字應為「<strong>${cWords[0]}</strong>」`);
  }

  const verbPatterns = ['können', 'will', 'möchte', 'muss', 'möchten', 'müssen', 'kann',
    'dürfen', 'soll', 'möchtest', 'fange', 'kaufe', 'komme', 'schalte', 'rufe',
    'kommt', 'arbeite', 'räume', 'gehe', 'kommen', 'heißen', 'heißt', 'ist',
    'wohnen', 'sind', 'arbeitet', 'machen', 'schlafen', 'trinken',
    'hören', 'sagen', 'erzählen', 'wohne', 'fahre', 'esse', 'bin',
    'wollen', 'sprechen', 'spielt', 'hört', 'fährt', 'war', 'hat', 'haben',
    'ziehen', 'werfen', 'packt', 'bringe', 'gehen', 'räumen'];
  const cVerb = cWords.find(w => verbPatterns.includes(w.toLowerCase()));
  const cVerbIdx = cWords.indexOf(cVerb);
  if (cVerb && cVerbIdx === 1) {
    const uVerbIdx = uWords.findIndex(w => w.toLowerCase() === cVerb.toLowerCase());
    if (uVerbIdx !== 1) {
      hints.push(`動詞「<strong>${cVerb}</strong>」應放在第二位`);
    }
  }

  const separablePrefixes = ['auf', 'an', 'ein', 'zurück', 'aus', 'mit', 'um', 'weg'];
  const cLastWord = cWords[cWords.length - 1];
  if (separablePrefixes.includes(cLastWord?.toLowerCase())) {
    const uLastWord = uWords[uWords.length - 1];
    if (uLastWord?.toLowerCase() !== cLastWord.toLowerCase()) {
      hints.push(`可分離前綴「<strong>${cLastWord}</strong>」應放在句末`);
    }
  }

  const weilIdx = cWords.findIndex(w => w.toLowerCase() === 'weil');
  if (weilIdx >= 0) {
    const uWeilIdx = uWords.findIndex(w => w.toLowerCase() === 'weil');
    if (uWeilIdx < 0) {
      hints.push('句子中需要用「<strong>weil</strong>」連接子句');
    } else {
      hints.push('注意：<strong>weil</strong> 子句中，動詞放在子句末尾');
    }
  }

  if (uWords.length !== cWords.length) {
    hints.push(`正確答案共有 <strong>${cWords.length}</strong> 個詞（不含標點）`);
  }

  if (hints.length === 0) {
    hints.push('順序不太對，注意德文主句中動詞要放在第二位');
  }

  return hints;
}

function pickRandomQuestions() {
  const indices = Array.from({length: DATA.length}, (_, i) => i);
  currentQuestions = shuffleArray(indices).slice(0, QUIZ_SIZE);
}

function render() {
  const container = document.getElementById('questions');
  container.innerHTML = '';
  document.getElementById('roundSummary').className = 'round-summary';
  document.getElementById('nextBtn').className = 'btn-next';

  currentQuestions.forEach((dataIdx, displayIdx) => {
    const q = DATA[dataIdx];
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${displayIdx}`;

    const shuffled = shuffleArray(q.fragments);

    card.innerHTML = `
      <div class="card-header">
        <div class="card-number">${displayIdx + 1}</div>
        <div class="card-label">請排列成正確的句子${q.verbHint ? `<span class="verb-hint">${q.verbHint}</span>` : ''}</div>
      </div>
      <div class="word-chips" id="chips-${displayIdx}">
        ${shuffled.map(f => `<span class="chip" data-q="${displayIdx}" data-text="${f}" onclick="chipClick(this)">${f}</span>`).join('')}
      </div>
      <div class="input-row">
        <input type="text" id="input-${displayIdx}" placeholder="在此輸入完整句子…"
               onkeydown="if(event.key==='Enter')submitAnswer(${displayIdx})" autocomplete="off" spellcheck="false">
        <button class="btn-submit" id="btn-${displayIdx}" onclick="submitAnswer(${displayIdx})">提交</button>
      </div>
      <div class="feedback" id="feedback-${displayIdx}"></div>
    `;

    container.appendChild(card);
  });
}

function chipClick(el) {
  const displayIdx = el.dataset.q;
  const text = el.dataset.text;
  const input = document.getElementById(`input-${displayIdx}`);
  if (input.disabled) return;

  const current = input.value.trim();
  if (['.', '?', '!', ','].includes(text)) {
    input.value = current + text;
  } else {
    input.value = current ? current + ' ' + text : text;
  }

  el.classList.add('used');
  input.focus();
}

function submitAnswer(displayIdx) {
  if (solved.has(displayIdx)) return;
  const dataIdx = currentQuestions[displayIdx];

  const input = document.getElementById(`input-${displayIdx}`);
  const feedback = document.getElementById(`feedback-${displayIdx}`);
  const card = document.getElementById(`card-${displayIdx}`);
  const btn = document.getElementById(`btn-${displayIdx}`);
  const userAnswer = input.value.trim();

  if (!userAnswer) {
    feedback.className = 'feedback show error';
    feedback.innerHTML = '請先輸入你的答案';
    return;
  }

  const user = normalize(userAnswer);
  const isCorrect = getAllAnswers(dataIdx).some(a => user.toLowerCase() === normalize(a).toLowerCase());

  if (isCorrect) {
    solved.add(displayIdx);
    stats.correct++;
    stats.roundCorrect++;
    stats.roundDone++;
    card.className = 'card correct';
    feedback.className = 'feedback show success';

    const others = getAllAnswers(dataIdx).filter(a => normalize(a).toLowerCase() !== user.toLowerCase());
    const altHtml = others.length
      ? `<div style="margin-top:.4rem;color:#86efac;font-size:.85rem">其他正確寫法：${others.map(a => `<strong>${a}</strong>`).join('、')}</div>`
      : '';
    const translation = TRANSLATIONS[dataIdx] || '';
    const transHtml = translation
      ? `<div class="translation">中文：${translation}</div>`
      : '';
    feedback.innerHTML = `<div>正確！做得好！</div>${altHtml}${transHtml}`;
    input.disabled = true;
    btn.disabled = true;

    if (stats.roundDone === QUIZ_SIZE) {
      showRoundSummary();
    }
  } else {
    stats.wrong++;
    stats.roundWrong++;
    card.className = 'card wrong';
    feedback.className = 'feedback show error';

    const closest = findClosestAnswer(userAnswer, dataIdx);
    const diffHtml = buildDiff(userAnswer, closest);
    const hints = getHints(userAnswer, closest);

    feedback.innerHTML = `
      <div>答案不正確，再試一次！</div>
      ${diffHtml}
      <button class="hint-btn" onclick="toggleHint(${displayIdx})">顯示提示</button>
      <div class="hint-text" id="hint-${displayIdx}">
        ${hints.map(h => `<div>💡 ${h}</div>`).join('')}
      </div>
    `;

    setTimeout(() => { card.className = 'card'; }, 1500);

    input.value = '';
    document.querySelectorAll(`#chips-${displayIdx} .chip.used`).forEach(c => c.classList.remove('used'));
  }

  updateScore();
}

function showRoundSummary() {
  const summary = document.getElementById('roundSummary');
  const title = document.getElementById('summaryTitle');
  const text = document.getElementById('summaryText');

  const perfect = stats.roundWrong === 0;
  title.textContent = perfect ? '滿分通過！太棒了！' : '本輪完成！';
  text.innerHTML = `本輪答對 <span class="stat-highlight">${stats.roundCorrect}</span> 題` +
    (stats.roundWrong > 0 ? `，錯誤嘗試 <span style="color:#f87171;font-weight:600">${stats.roundWrong}</span> 次` : '') +
    `<br>累計正確：${stats.correct}　累計錯誤：${stats.wrong}`;

  summary.className = 'round-summary show';
  document.getElementById('nextBtn').className = 'btn-next show';
}

function nextRound() {
  stats.roundCorrect = 0;
  stats.roundWrong = 0;
  stats.roundDone = 0;
  solved.clear();
  pickRandomQuestions();
  updateScore();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHint(displayIdx) {
  const hint = document.getElementById(`hint-${displayIdx}`);
  hint.classList.toggle('show');
}

function updateScore() {
  document.getElementById('correctCount').textContent = `正確：${stats.roundCorrect}`;
  document.getElementById('wrongCount').textContent = `錯誤：${stats.roundWrong}`;
  document.getElementById('totalCount').textContent = `完成：${stats.roundDone} / ${QUIZ_SIZE}`;
}

document.getElementById('nextBtn').addEventListener('click', nextRound);

document.getElementById('resetBtn').addEventListener('click', () => {
  stats = { correct: 0, wrong: 0, roundCorrect: 0, roundWrong: 0, roundDone: 0 };
  solved.clear();
  pickRandomQuestions();
  updateScore();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

pickRandomQuestions();
render();
</script>
